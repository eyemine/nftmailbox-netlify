services:
  nftmail:
    build:
      context: app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_PRIVY_APP_ID
        - NEXT_PUBLIC_GNOSIS_RPC
        - NEXT_PUBLIC_BASE_RPC
        - NEXT_PUBLIC_WORKER_URL
        - NEXT_PUBLIC_APP_URL
        - NEXT_PUBLIC_GHOSTAGENT_PROXY_URL
    image: nftmail:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
    restart: unless-stopped
    # worker.nftmail.box has no public DNS record — it is only an nginx
    # server_name on this host. Map it to the host gateway so the container
    # can reach the Bun worker (via nginx:443, which holds the TLS cert).
    # Without this, /api/resolve-nftmail cannot list KV-held NFT accounts and
    # falls back to an empty on-chain scan (only social/embedded wallets show).
    extra_hosts:
      - "worker.nftmail.box:host-gateway"
