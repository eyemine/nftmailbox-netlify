# Redirect nftmail.app to nftmail.box (HTTP)
server {
    listen 80;
    server_name nftmail.app www.nftmail.app;
    return 301 https://nftmail.box$request_uri;
}

# Redirect nftmail.app to nftmail.box (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nftmail.app www.nftmail.app;

    ssl_certificate /etc/letsencrypt/live/nftmail.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nftmail.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nftmail.box$request_uri;
}

server {
    listen 80;
    server_name nftmail.box www.nftmail.box;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Next.js app
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy API routes
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

